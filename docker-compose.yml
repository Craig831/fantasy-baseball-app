version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fantasy-baseball-frontend
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:5000}
    networks:
      - fantasy-baseball-network
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: fantasy-baseball-nginx
    volumes:
      - ./infrastructure/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
    networks:
      - fantasy-baseball-network
    restart: unless-stopped

networks:
  fantasy-baseball-network:
    driver: bridge
